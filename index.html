<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Chapa Super App | Kenyan Lifestyle Ecosystem</title>
    <!-- Tailwind CSS + Font Awesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* custom scrollbar & animations */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .toast-notif { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); transition: 0.2s; box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

<div id="root"></div>

<script type="text/babel">
    // ---------- UTILS ----------
    const generateId = () => Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    const getTimestamp = () => new Date().toLocaleString('en-KE', { hour12: false });

    // ---------- INITIAL DATA & LOCALSTORAGE ----------
    const STORAGE_KEYS = {
        USER: 'chapa_user',
        BALANCE: 'chapa_balance',
        TRANSACTIONS: 'chapa_transactions',
        NOTIFICATIONS: 'chapa_notifications'
    };

    const defaultUser = { name: "James Kariuki", phone: "+254 712 345 678", avatarInitials: "JK" };
    const defaultBalance = 5250.00;
    const defaultTransactions = [
        { id: "t1", type: "credit", amount: 1000, description: "M-PESA deposit (Simulated)", timestamp: getTimestamp() },
        { id: "t2", type: "debit", amount: 350, description: "KPLC Token Payment", timestamp: getTimestamp() }
    ];
    const defaultNotifications = [
        { id: "n1", message: "🎉 Welcome to Chapa Super App! Your lifestyle hub.", read: false, timestamp: getTimestamp() },
        { id: "n2", message: "💳 Wallet ready. Top up to enjoy all services.", read: false, timestamp: getTimestamp() }
    ];

    function loadInitialState() {
        const storedUser = localStorage.getItem(STORAGE_KEYS.USER);
        const storedBalance = localStorage.getItem(STORAGE_KEYS.BALANCE);
        const storedTransactions = localStorage.getItem(STORAGE_KEYS.TRANSACTIONS);
        const storedNotifications = localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS);
        return {
            user: storedUser ? JSON.parse(storedUser) : defaultUser,
            balance: storedBalance ? parseFloat(storedBalance) : defaultBalance,
            transactions: storedTransactions ? JSON.parse(storedTransactions) : defaultTransactions,
            notifications: storedNotifications ? JSON.parse(storedNotifications) : defaultNotifications,
        };
    }

    function persistState(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
    }

    // ---------- CONTEXT & REDUCER ----------
    const AppContext = React.createContext();

    const initialState = loadInitialState();

    function appReducer(state, action) {
        let newState;
        switch (action.type) {
            case 'TOP_UP':
                newState = { ...state, balance: state.balance + action.amount };
                persistState(STORAGE_KEYS.BALANCE, newState.balance);
                return newState;
            case 'DEBIT':
                if (state.balance >= action.amount) {
                    newState = { ...state, balance: state.balance - action.amount };
                    persistState(STORAGE_KEYS.BALANCE, newState.balance);
                    return newState;
                }
                return state; // insufficient funds -> no change
            case 'ADD_TRANSACTION':
                const updatedTx = [action.transaction, ...state.transactions].slice(0, 100);
                newState = { ...state, transactions: updatedTx };
                persistState(STORAGE_KEYS.TRANSACTIONS, updatedTx);
                return newState;
            case 'ADD_NOTIFICATION':
                const updatedNotif = [{ ...action.notification, id: generateId(), timestamp: getTimestamp() }, ...state.notifications].slice(0, 50);
                newState = { ...state, notifications: updatedNotif };
                persistState(STORAGE_KEYS.NOTIFICATIONS, updatedNotif);
                return newState;
            case 'CLEAR_ALL_NOTIFICATIONS':
                newState = { ...state, notifications: [] };
                persistState(STORAGE_KEYS.NOTIFICATIONS, []);
                return newState;
            case 'RESET_DEMO':
                const resetState = {
                    user: defaultUser,
                    balance: defaultBalance,
                    transactions: defaultTransactions,
                    notifications: defaultNotifications
                };
                persistState(STORAGE_KEYS.USER, resetState.user);
                persistState(STORAGE_KEYS.BALANCE, resetState.balance);
                persistState(STORAGE_KEYS.TRANSACTIONS, resetState.transactions);
                persistState(STORAGE_KEYS.NOTIFICATIONS, resetState.notifications);
                return resetState;
            default:
                return state;
        }
    }

    const AppProvider = ({ children }) => {
        const [state, dispatch] = React.useReducer(appReducer, initialState);
        
        // Helper: make payment (debit + record transaction + push notification)
        const makePayment = (amount, description, serviceType = 'payment') => {
            if (amount <= 0) {
                addNotification("Invalid amount. Please enter positive value.", "error");
                return false;
            }
            if (state.balance < amount) {
                addNotification(`Insufficient funds! Your balance is KES ${state.balance.toFixed(2)}`, "error");
                return false;
            }
            // debit
            dispatch({ type: 'DEBIT', amount });
            // transaction record
            const transaction = {
                id: generateId(),
                type: "debit",
                amount: amount,
                description: description,
                timestamp: getTimestamp()
            };
            dispatch({ type: 'ADD_TRANSACTION', transaction });
            // success notif
            addNotification(`✅ ${description} - KES ${amount.toFixed(2)} successfully.`, "success");
            return true;
        };

        const topUpWallet = (amount) => {
            if (amount <= 0) {
                addNotification("Top-up amount must be greater than 0", "error");
                return false;
            }
            dispatch({ type: 'TOP_UP', amount });
            const transaction = {
                id: generateId(),
                type: "credit",
                amount: amount,
                description: `M-PESA Wallet top-up (simulated)`,
                timestamp: getTimestamp()
            };
            dispatch({ type: 'ADD_TRANSACTION', transaction });
            addNotification(`💰 Wallet topped up with KES ${amount.toFixed(2)} via M-PESA`, "success");
            return true;
        };

        const addNotification = (message, type = "info") => {
            const notif = {
                id: generateId(),
                message: message,
                read: false,
                type: type,
                timestamp: getTimestamp()
            };
            dispatch({ type: 'ADD_NOTIFICATION', notification: notif });
        };

        const clearAllNotifications = () => {
            dispatch({ type: 'CLEAR_ALL_NOTIFICATIONS' });
            addNotification("All notifications cleared", "info");
        };

        const resetDemo = () => {
            dispatch({ type: 'RESET_DEMO' });
            addNotification("🔄 Demo reset to default state", "info");
        };

        const value = {
            ...state,
            makePayment,
            topUpWallet,
            addNotification,
            clearAllNotifications,
            resetDemo
        };

        return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
    };

    const useApp = () => React.useContext(AppContext);

    // ---------- COMPONENTS ----------
    const WalletCard = () => {
        const { balance, topUpWallet, addNotification } = useApp();
        const [topupAmount, setTopupAmount] = React.useState('');
        const handleTopUp = () => {
            const amt = parseFloat(topupAmount);
            if (isNaN(amt)) {
                addNotification("Enter a valid amount (KES)", "error");
                return;
            }
            topUpWallet(amt);
            setTopupAmount('');
        };
        return (
            <div className="bg-gradient-to-br from-emerald-700 to-green-800 rounded-2xl p-5 text-white shadow-xl card-hover">
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-emerald-100 text-sm flex items-center gap-1"><i className="fas fa-mobile-alt"></i> M-PESA Sim</p>
                        <p className="text-3xl font-bold mt-1">KES {balance.toFixed(2)}</p>
                        <p className="text-emerald-200 text-xs mt-1">Available balance</p>
                    </div>
                    <i className="fas fa-wallet text-4xl text-emerald-200 opacity-80"></i>
                </div>
                <div className="mt-4 flex gap-2">
                    <input type="number" placeholder="Amount (KES)" value={topupAmount} onChange={(e) => setTopupAmount(e.target.value)} className="w-2/3 p-2 rounded-xl text-gray-800 text-sm outline-none focus:ring-2 focus:ring-emerald-300"/>
                    <button onClick={handleTopUp} className="bg-white text-emerald-800 px-4 py-2 rounded-xl font-semibold text-sm shadow-md hover:bg-gray-100 transition"><i className="fas fa-plus-circle mr-1"></i> Top Up</button>
                </div>
            </div>
        );
    };

    const BillPayments = () => {
        const { makePayment } = useApp();
        const [billType, setBillType] = React.useState('KPLC Token');
        const [amount, setAmount] = React.useState('');
        const [account, setAccount] = React.useState('');
        const handlePay = () => {
            const amt = parseFloat(amount);
            if (isNaN(amt) || amt <= 0) return makePayment(0, '', false);
            let desc = `${billType} payment`;
            if (account) desc += ` (Acc: ${account})`;
            const success = makePayment(amt, desc, 'bill');
            if (success) { setAmount(''); setAccount(''); }
        };
        const billOptions = [
            { label: "⚡ KPLC Token", value: "KPLC Token" },
            { label: "💧 Nairobi Water", value: "Nairobi Water" },
            { label: "🌐 Safaricom Internet", value: "Safaricom Internet" }
        ];
        return (
            <div className="bg-white rounded-2xl shadow-md p-4">
                <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2 mb-3"><i className="fas fa-receipt text-emerald-600"></i> Bill Payments</h3>
                <div className="space-y-3">
                    <select value={billType} onChange={(e) => setBillType(e.target.value)} className="w-full p-2 border border-gray-300 rounded-xl bg-gray-50 text-sm">
                        {billOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </select>
                    <input type="text" placeholder="Account / Meter number (optional)" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full p-2 border border-gray-300 rounded-xl text-sm"/>
                    <input type="number" placeholder="Amount (KES)" value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full p-2 border border-gray-300 rounded-xl text-sm"/>
                    <button onClick={handlePay} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-xl transition flex items-center justify-center gap-1"><i className="fas fa-shield-alt"></i> Pay Bill</button>
                </div>
            </div>
        );
    };

    const RideBooking = () => {
        const { makePayment } = useApp();
        const [rideType, setRideType] = React.useState('boda');
        const [distance, setDistance] = React.useState(5);
        const [pickup, setPickup] = React.useState('Westlands');
        const [destination, setDestination] = React.useState('CBD');
        const calculateFare = () => {
            if (rideType === 'boda') return Math.floor(120 + distance * 15);
            return Math.floor(70 + distance * 10);
        };
        const fare = calculateFare();
        const handleBook = () => {
            const desc = `${rideType === 'boda' ? 'Boda 🏍️' : 'Matatu 🚐'} ride from ${pickup} to ${destination} (${distance}km)`;
            makePayment(fare, desc, 'ride');
        };
        return (
            <div className="bg-white rounded-2xl shadow-md p-4">
                <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2 mb-3"><i className="fas fa-motorcycle text-emerald-600"></i> Ride Booking</h3>
                <div className="space-y-3">
                    <div className="flex gap-2">
                        <button onClick={() => setRideType('boda')} className={`flex-1 py-2 rounded-xl font-medium transition ${rideType === 'boda' ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-700'}`}><i className="fas fa-motorcycle mr-1"></i> Boda</button>
                        <button onClick={() => setRideType('matatu')} className={`flex-1 py-2 rounded-xl font-medium transition ${rideType === 'matatu' ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-700'}`}><i className="fas fa-bus mr-1"></i> Matatu</button>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Pickup" value={pickup} onChange={e => setPickup(e.target.value)} className="p-2 border rounded-xl text-sm"/>
                        <input type="text" placeholder="Destination" value={destination} onChange={e => setDestination(e.target.value)} className="p-2 border rounded-xl text-sm"/>
                    </div>
                    <div>
                        <label className="text-xs text-gray-500">Distance (km): {distance}</label>
                        <input type="range" min="1" max="20" value={distance} onChange={e => setDistance(parseInt(e.target.value))} className="w-full"/>
                    </div>
                    <div className="bg-emerald-50 p-3 rounded-xl flex justify-between items-center">
                        <span className="font-semibold">Estimated Fare:</span>
                        <span className="text-emerald-700 font-bold text-xl">KES {fare}</span>
                    </div>
                    <button onClick={handleBook} className="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2 rounded-xl transition"><i className="fas fa-check-circle mr-1"></i> Book Ride</button>
                </div>
            </div>
        );
    };

    const FoodDelivery = () => {
        const { makePayment } = useApp();
        const menu = [
            { id: 1, name: "Nyama Choma Platter", price: 550, image: "🍖" },
            { id: 2, name: "Ugali Fish (Tilapia)", price: 480, image: "🐟" },
            { id: 3, name: "Chips Masala", price: 250, image: "🍟" },
            { id: 4, name: "Kachumbari & Chapo", price: 180, image: "🌮" }
        ];
        const [cart, setCart] = React.useState([]);
        const addToCart = (item) => {
            setCart(prev => {
                const existing = prev.find(i => i.id === item.id);
                if (existing) return prev.map(i => i.id === item.id ? {...i, qty: i.qty+1} : i);
                return [...prev, {...item, qty: 1}];
            });
        };
        const updateQty = (id, delta) => {
            setCart(prev => prev.map(i => i.id === id ? {...i, qty: Math.max(0, i.qty+delta)} : i).filter(i => i.qty > 0));
        };
        const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
        const checkout = () => {
            if (cart.length === 0) return makePayment(0, '', false);
            const itemsDesc = cart.map(i => `${i.name} x${i.qty}`).join(', ');
            const success = makePayment(total, `Food delivery: ${itemsDesc}`, 'food');
            if (success) setCart([]);
        };
        return (
            <div className="bg-white rounded-2xl shadow-md p-4">
                <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2 mb-2"><i className="fas fa-utensils text-emerald-600"></i> Food Delivery</h3>
                <div className="max-h-48 overflow-y-auto mb-2 space-y-2">
                    {menu.map(item => (
                        <div key={item.id} className="flex justify-between items-center border-b pb-2">
                            <div><span className="text-xl mr-2">{item.image}</span><span className="font-medium">{item.name}</span><span className="text-emerald-700 text-sm ml-2">KES {item.price}</span></div>
                            <button onClick={() => addToCart(item)} className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm"><i className="fas fa-plus"></i> Add</button>
                        </div>
                    ))}
                </div>
                {cart.length > 0 && (
                    <div className="bg-gray-50 p-3 rounded-xl mt-2">
                        <p className="font-semibold text-sm">Your Order:</p>
                        {cart.map(i => (
                            <div key={i.id} className="flex justify-between text-sm items-center mt-1">
                                <span>{i.name} x{i.qty}</span>
                                <div><button onClick={() => updateQty(i.id, -1)} className="px-2 bg-gray-200 rounded">-</button><span className="mx-2">KES {i.price * i.qty}</span><button onClick={() => updateQty(i.id, 1)} className="px-2 bg-gray-200 rounded">+</button></div>
                            </div>
                        ))}
                        <div className="flex justify-between font-bold mt-2 pt-2 border-t">Total: KES {total}<button onClick={checkout} className="bg-emerald-600 text-white px-4 py-1 rounded-lg text-sm">Place Order</button></div>
                    </div>
                )}
                {cart.length === 0 && <p className="text-gray-400 text-center text-sm py-2">Add tasty Kenyan dishes 🍲</p>}
            </div>
        );
    };

    const Marketplace = () => {
        const { makePayment } = useApp();
        const products = [
            { id: 101, name: "Premium Maize Flour (2kg)", price: 210, seller: "Fresh Grocer" },
            { id: 102, name: "Sunflower Cooking Oil 1L", price: 340, seller: "Tuk Tuk Mart" },
            { id: 103, name: "Sweet Rice - Pishori 2kg", price: 520, seller: "Naivas Express" },
            { id: 104, name: "Afya Detergent Soap", price: 180, seller: "SuperSoko" }
        ];
        const buyNow = (product) => {
            makePayment(product.price, `Marketplace: ${product.name} (${product.seller})`, 'market');
        };
        return (
            <div className="bg-white rounded-2xl shadow-md p-4">
                <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2 mb-3"><i className="fas fa-store text-emerald-600"></i> Marketplace</h3>
                <div className="grid grid-cols-2 gap-3">
                    {products.map(p => (
                        <div key={p.id} className="border rounded-xl p-2 hover:shadow transition">
                            <div className="h-12 w-12 bg-emerald-100 rounded-full flex items-center justify-center mx-auto text-xl">🛍️</div>
                            <p className="font-semibold text-sm mt-1 text-center">{p.name}</p>
                            <p className="text-emerald-700 font-bold text-center">KES {p.price}</p>
                            <button onClick={() => buyNow(p)} className="w-full mt-2 bg-emerald-50 text-emerald-700 py-1 rounded-lg text-xs font-medium">Buy now</button>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    const TransactionHistory = () => {
        const { transactions } = useApp();
        return (
            <div className="bg-white rounded-2xl shadow-md p-4 col-span-1 md:col-span-2">
                <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2 mb-2"><i className="fas fa-history text-emerald-600"></i> Transaction History</h3>
                <div className="max-h-64 overflow-y-auto space-y-2">
                    {transactions.length === 0 && <p className="text-gray-400 text-center py-3">No transactions yet</p>}
                    {transactions.map(tx => (
                        <div key={tx.id} className="flex justify-between items-center border-b border-gray-100 pb-2">
                            <div><p className="text-sm font-medium">{tx.description}</p><p className="text-xs text-gray-400">{tx.timestamp}</p></div>
                            <span className={`font-bold ${tx.type === 'credit' ? 'text-green-600' : 'text-red-500'}`}>{tx.type === 'credit' ? '+' : '-'} KES {tx.amount.toFixed(2)}</span>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    const NotificationsPanel = () => {
        const { notifications, clearAllNotifications } = useApp();
        const [isOpen, setIsOpen] = React.useState(false);
        const unreadCount = notifications.filter(n => !n.read).length;
        return (
            <div className="relative">
                <button onClick={() => setIsOpen(!isOpen)} className="relative bg-white p-2 rounded-full shadow-md hover:bg-gray-50 transition">
                    <i className="fas fa-bell text-emerald-700 text-xl"></i>
                    {unreadCount > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">{unreadCount}</span>}
                </button>
                {isOpen && (
                    <div className="absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-xl z-50 border max-h-96 overflow-y-auto">
                        <div className="p-3 border-b flex justify-between items-center sticky top-0 bg-white">
                            <span className="font-bold">Notifications</span>
                            <button onClick={clearAllNotifications} className="text-xs text-emerald-600">Clear all</button>
                        </div>
                        {notifications.length === 0 && <div className="p-4 text-center text-gray-400">No notifications</div>}
                        {notifications.map(notif => (
                            <div key={notif.id} className="p-3 border-b hover:bg-gray-50 text-sm">
                                <p className="text-gray-700">{notif.message}</p>
                                <p className="text-gray-400 text-xs mt-1">{notif.timestamp}</p>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    const UserProfile = () => {
        const { user, resetDemo } = useApp();
        return (
            <div className="flex items-center gap-3 bg-white/80 backdrop-blur-sm rounded-full pl-2 pr-4 py-1 shadow-sm">
                <div className="bg-emerald-700 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm">{user.avatarInitials}</div>
                <div className="text-sm leading-tight hidden sm:block"><p className="font-semibold">{user.name}</p><p className="text-xs text-gray-500">{user.phone}</p></div>
                <button onClick={resetDemo} className="text-xs bg-gray-200 hover:bg-gray-300 rounded-full px-3 py-1 transition"><i className="fas fa-sync-alt mr-1"></i> Reset</button>
            </div>
        );
    };

    const ArchitectureShowcase = () => {
        const [showArch, setShowArch] = React.useState(false);
        return (
            <div className="mt-6 bg-white rounded-2xl shadow-sm overflow-hidden">
                <button onClick={() => setShowArch(!showArch)} className="w-full p-4 text-left font-semibold flex justify-between items-center bg-gray-50 hover:bg-gray-100"><span><i className="fas fa-cloud-upload-alt text-emerald-600 mr-2"></i> System Architecture & Scalability (Microservices ready)</span><i className={`fas fa-chevron-${showArch ? 'up' : 'down'}`}></i></button>
                {showArch && (
                    <div className="p-5 text-gray-700 text-sm space-y-3 border-t">
                        <p className="font-bold">⚡ Scalable backend design - "Chapa Super App Ecosystem"</p>
                        <div className="bg-gray-900 text-green-200 p-4 rounded-xl font-mono text-xs overflow-x-auto">
                            <pre>{`[API Gateway] → [Auth Service] (Single User Account)
        ├── Wallet Service (M-Pesa simulation / ledger)
        ├── Bill Payments Service (KPLC, water, ISP)
        ├── Ride Booking (Boda/Matatu geolocation queue)
        ├── Food Delivery (Order & dispatch)
        ├── Marketplace (Inventory, vendor mgmt)
        ├── Transaction History (immutable event sourcing)
        └── Notifications (Websocket/Redis pub/sub)`}
                            </pre>
                        </div>
                        <p>✅ <strong>Scalability patterns:</strong> Event-driven architecture (Kafka/RabbitMQ) for async updates, CQRS for transaction history, Redis caching for wallet reads, horizontal scaling per module (ride service can scale independently during peak hours). All services share unified user JWT token, ensuring single account across domains. Notifications delivered via server-sent events & push.</p>
                        <p>🇰🇪 <strong>Kenya-grade readiness:</strong> M-Pesa API simulation, offline-first for USSD fallback, real-time fraud detection, and elastic container orchestration (K8s).</p>
                    </div>
                )}
            </div>
        );
    };

    // Main App Layout
    const App = () => {
        const [activeTab, setActiveTab] = React.useState('wallet');
        const tabs = [
            { id: 'wallet', label: 'Wallet', icon: 'fas fa-wallet' },
            { id: 'bills', label: 'Bills', icon: 'fas fa-receipt' },
            { id: 'ride', label: 'Ride', icon: 'fas fa-motorcycle' },
            { id: 'food', label: 'Food', icon: 'fas fa-utensils' },
            { id: 'market', label: 'Market', icon: 'fas fa-store' },
            { id: 'history', label: 'History', icon: 'fas fa-clock' }
        ];
        return (
            <AppProvider>
                <div className="max-w-6xl mx-auto px-4 py-5 md:py-6">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-5">
                        <div className="flex items-center gap-2">
                            <i className="fas fa-crown text-2xl text-emerald-700"></i>
                            <h1 className="text-2xl font-extrabold bg-gradient-to-r from-emerald-800 to-green-600 bg-clip-text text-transparent">Chapa<span className="text-emerald-600"> SuperApp</span></h1>
                            <span className="bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded-full">Kenya Lifestyle</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <NotificationsPanel />
                            <UserProfile />
                        </div>
                    </div>
                    {/* Wallet Card always visible */}
                    <div className="mb-5"><WalletCard /></div>
                    {/* Tabs navigation */}
                    <div className="flex overflow-x-auto gap-1 bg-white p-1 rounded-2xl shadow-sm mb-5 sticky top-0 z-10">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-2 rounded-xl text-sm font-medium transition flex items-center justify-center gap-1 ${activeTab === tab.id ? 'bg-emerald-600 text-white shadow' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                                <i className={tab.icon}></i> <span className="hidden sm:inline">{tab.label}</span>
                            </button>
                        ))}
                    </div>
                    {/* Dynamic content */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        {activeTab === 'wallet' && (
                            <>
                                <div className="md:col-span-2"><TransactionHistory /></div>
                                <div className="md:col-span-2 text-center text-gray-400 text-sm p-2">💡 Wallet supports M-Pesa style top-up & cross-service payments.</div>
                            </>
                        )}
                        {activeTab === 'bills' && <BillPayments />}
                        {activeTab === 'ride' && <RideBooking />}
                        {activeTab === 'food' && <FoodDelivery />}
                        {activeTab === 'market' && <Marketplace />}
                        {activeTab === 'history' && <TransactionHistory />}
                    </div>
                    {activeTab !== 'wallet' && activeTab !== 'history' && (
                        <div className="mt-5"><TransactionHistory /></div>
                    )}
                    {/* Architecture & scalability section */}
                    <ArchitectureShowcase />
                    <footer className="text-center text-xs text-gray-400 mt-6 pb-4">🔐 Single user account • All services unified • Real transaction history & smart notifications</footer>
                </div>
            </AppProvider>
        );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
